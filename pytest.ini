[pytest]
# Pytest configuration for StepMania chart analysis tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers

# Test paths
testpaths = tests

# Markers for test organization
markers =
    parser: Tests for SM file parsing
    features: Tests for feature extraction
    regression: Regression tests against baseline data
    edge_case: Tests for specific edge cases
    slow: Tests that take longer to run
    integration: Integration tests with real song collection
    scale: Tests for scale detection and normalization

# Warnings
filterwarnings =
    ignore::DeprecationWarning
